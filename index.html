<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Paw to Wear · BGM 曲库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">
      <span class="logo-icon">🐾</span>
      <span class="logo-text">Paw to Wear <em>BGM</em></span>
    </a>
    <div class="header-meta">
      <span class="song-count" id="songCount">0 首</span>
      <button class="btn-clear" id="btnClear" disabled>清除筛选</button>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="搜索歌名、艺人…" class="search-input">
    </div>

    <div class="filter-section">
      <div class="filter-toggle">
        <label class="toggle-label">
          <input type="checkbox" id="toggleCommercial" checked>
          <span>仅显示可商用</span>
        </label>
      </div>
    </div>

    <div class="filter-groups" id="filterGroups">
      <!-- dynamically generated -->
    </div>
  </aside>

  <main class="main" id="main">
    <div class="results-bar" id="resultsBar"></div>
    <div class="song-grid" id="songGrid">
      <!-- dynamically generated -->
    </div>
    <div class="empty-state" id="emptyState" hidden>
      <p>没有匹配的歌曲</p>
      <button class="btn-text" id="btnReset">重置所有筛选</button>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
</body>
</html>
